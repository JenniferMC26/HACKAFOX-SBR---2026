name: camino_front
description: "PASO — Plataforma de Accesibilidad para Servicios y Orientación en Tijuana."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  google_maps_flutter: ^2.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo_icon.png
    - assets/images/logo_full.png

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/logo_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/logo_icon.png"
