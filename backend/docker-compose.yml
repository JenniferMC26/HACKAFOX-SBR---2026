# ─────────────────────────────────────────────────────────────────────────────
# Paso — docker-compose.yml
#
# Dos servicios:
#   web   → nginx que sirve public/ (test console) en http://localhost:5000
#   seed  → runner Node.js para los scripts de seed contra Supabase
#
# Supabase corre en la nube — toda la lógica (auth, DB, storage, realtime) sale
# del browser directo al proyecto Supabase usando las claves de public/config.js.
# Las claves de servidor (SUPABASE_SERVICE_KEY, etc.) solo las usa el runner de
# seed y vienen del .env.
#
# Comandos frecuentes:
#   docker compose up -d                                         → levantar web
#   docker compose down                                          → apagar
#   docker compose run --rm seed node seed/supabase-seed.js      → seed nodos
#   docker compose run --rm seed node seed/users-seed.js         → seed usuarios
# ─────────────────────────────────────────────────────────────────────────────

services:
  web:
    image: nginx:alpine
    container_name: paso_web
    ports:
      - "5000:80"
    volumes:
      - ./public:/usr/share/nginx/html:ro
    restart: unless-stopped

  seed:
    build: .
    container_name: paso_seed
    working_dir: /app
    volumes:
      - .:/app
      - seed_node_modules:/app/node_modules
    env_file:
      - .env
    entrypoint: []
    command: ["echo", "Uso: docker compose run --rm seed node seed/<script>.js"]

volumes:
  seed_node_modules:
